[tool.ruff]
# 1. 基础配置
line-length = 120                  # 行长度（和 Black 一致）
target-version = "py313"            # 你的项目 Python 版本（你要小写类型，至少 3.9）
exclude = [".venv"]  # 忽略目录

# 2. Lint 规则
[tool.ruff.lint]
# 启用的规则组：
# E/W: 风格错误；F: 逻辑错误；I: import 排序；UP: 语法升级（关键！）；B: bugbear 严格规则
select = ["E", "W", "F", "I", "UP", "B"]
# 忽略的规则（可选，根据项目调整）
ignore = ["E501"]  # 行过长交给 formatter 控制，不报错

# 3. 自动修复
fixable = ["ALL"]  # 所有可修复规则都自动修
unfixable = []

# 4. 格式化（替代 Black）
[tool.ruff.format]
quote-style = "double"  # 字符串用双引号
indent-style = "space"